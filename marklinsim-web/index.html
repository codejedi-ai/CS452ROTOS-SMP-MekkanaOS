<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title>cs452-trains</title>
    <style>
        html, body { margin: 0; padding: 0; height: 100%; background: #1a1a1a; color: #ccc;
                     font-family: ui-monospace, Menlo, monospace; overflow: hidden; }
        #app { display: grid; grid-template-rows: 24px 1fr; height: 100vh; }
        #bar { background: #111; border-bottom: 1px solid #333; padding: 4px 10px;
               font-size: 12px; display: flex; gap: 16px; }
        #bar .dot { width: 8px; height: 8px; border-radius: 4px; background: #555;
                    display: inline-block; margin-right: 4px; vertical-align: middle; }
        #bar .ok  { background: #4c9 }
        #bar .bad { background: #c55 }
        #panes { display: grid; grid-template-columns: 1fr 480px; height: 100%; min-height: 0; }
        #left  { background: #fff; position: relative; overflow: hidden; }
        #left canvas { display: block; }
        #right { border-left: 1px solid #333; display: flex; flex-direction: column; min-width: 0; }
        #right iframe { border: 0; flex: 1; background: #000; }
        #left .placeholder { position: absolute; inset: 0; display: flex; align-items: center;
                             justify-content: center; color: #999; font-size: 14px; }
    </style>
</head>
<body>
    <div id="app">
        <div id="bar">
            <span><span id="ws-dot"    class="dot"></span>track view</span>
            <span><span id="shell-dot" class="dot ok"></span>kernel shell &mdash; Track A</span>
            <span style="margin-left:auto; opacity: 0.6">cs452-trains | one port: 8080</span>
        </div>
        <div id="panes">
            <div id="left">
                <div class="placeholder" id="placeholder">connecting to /ws &hellip;</div>
            </div>
            <div id="right">
                <iframe src="/shell/" title="kernel shell"></iframe>
            </div>
        </div>
    </div>
    <script>
        // Surface any uncaught error from the bundle so we don't have to
        // pop DevTools to diagnose.
        window.addEventListener('error', function (ev) {
            var box = document.createElement('pre');
            box.style.cssText = 'position:fixed;bottom:0;left:0;right:0;background:#922;color:#fff;' +
                                'padding:8px;margin:0;font-size:12px;z-index:9999;white-space:pre-wrap';
            box.textContent = 'JS: ' + ev.message + '\n@ ' + ev.filename + ':' + ev.lineno + ':' + ev.colno;
            document.body.appendChild(box);
        });

        // Redirect Pixi's `document.body.appendChild(canvas)` to the left pane.
        // The upstream renderer hard-codes body as the parent; we intercept here
        // BEFORE bundle.js runs so the canvas lands in the right grid cell.
        (function () {
            var realAppend = document.body.appendChild.bind(document.body);
            document.body.appendChild = function (el) {
                if (el && el.tagName === 'CANVAS') {
                    var slot = document.getElementById('left');
                    return slot ? slot.appendChild(el) : realAppend(el);
                }
                return realAppend(el);
            };
        })();

        // Status dot + placeholder removal.
        (function () {
            var dot = document.getElementById('ws-dot');
            var ph  = document.getElementById('placeholder');
            var ws  = new WebSocket(
                (location.protocol === 'https:' ? 'wss:' : 'ws:') + '//' + location.host + '/ws');
            ws.onopen    = function () { dot.className = 'dot ok'; };
            ws.onmessage = function () { if (ph) { ph.remove(); ph = null; } };
            ws.onclose   = function () { dot.className = 'dot bad'; };
        })();
    </script>
    <script src="/bundle.js"></script>
</body>
</html>
