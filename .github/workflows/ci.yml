name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout kernel
        uses: actions/checkout@v4
        with:
          path: kernel

      - name: Checkout platform
        uses: actions/checkout@v4
        with:
          repository: codejedi-ai/CS452ROTOS-PLATFORM
          path: github_codejedi-ai_CS452ROTOS-PLATFORM
          lfs: true

      - name: Setup host platform (QEMU + toolchain)
        run: |
          cd github_codejedi-ai_CS452ROTOS-PLATFORM
          sudo ./scripts/setup-host.sh

      - name: Build kernel
        working-directory: kernel
        env:
          PLATFORM: ${{ github.workspace }}/github_codejedi-ai_CS452ROTOS-PLATFORM
        run: ./dev.sh make all

      - name: SMP IPC tests (QEMU)
        working-directory: kernel
        env:
          PLATFORM: ${{ github.workspace }}/github_codejedi-ai_CS452ROTOS-PLATFORM
        run: ./dev.sh make test-smp
