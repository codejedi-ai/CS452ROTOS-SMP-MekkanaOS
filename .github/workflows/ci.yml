name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout kernel
        uses: actions/checkout@v4
        with:
          path: kernel

      - name: Checkout platform
        uses: actions/checkout@v4
        with:
          repository: codejedi-ai/CS452ROTOS-PLATFORM
          path: github_codejedi-ai_CS452ROTOS-PLATFORM

      - name: Build kernel
        working-directory: kernel
        run: ./dev.sh make all
